<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng bạn</title>

<!-- CONFETTI LIB -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
html, body{
margin:0;
padding:0;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, sans-serif;
overflow:hidden;
}

img{
width:100vw;
height:100vh;
object-fit:contain;
}

#title{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:28px;
font-weight:bold;
text-align:center;
text-shadow:0 0 10px black;
}
</style>
</head>

<body>

<div id="title">🎉 CHÚC MỪNG BẠN 🎉</div>

<img id="gift" src="">

<audio id="music" preload="auto">
<source src="win.mp3" type="audio/mpeg">
</audio>

<script>

/* ===============================
   DANH SÁCH QUÀ + TỶ LỆ
   =============================== */

const gifts = [
{img:"voucher.png", chance:60},
{img:"qua1.png", chance:6},
{img:"qua2.png", chance:6},
{img:"qua3.png", chance:6},
{img:"qua4.png", chance:6},
{img:"qua5.png", chance:6},
{img:"qua6.png", chance:10}
];


/* ===============================
   RANDOM QUÀ THEO TỶ LỆ
   =============================== */

function getGift(){
let total = gifts.reduce((sum,g)=>sum+g.chance,0);
let rand = Math.random()*total;
let running = 0;

for(let g of gifts){
running += g.chance;
if(rand < running) return g.img;
}
}


/* ===============================
   CONFETTI SIÊU MẠNH FULL MÀN
   =============================== */

function launchConfetti(){

const duration = 3000;
const end = Date.now() + duration;

(function frame(){
confetti({
particleCount:8,
angle:60,
spread:80,
origin:{x:0}
});

confetti({
particleCount:8,
angle:120,
spread:80,
origin:{x:1}
});

if(Date.now() < end){
requestAnimationFrame(frame);
}
})();
}


/* ===============================
   PHÁT NHẠC (AUTO + FALLBACK)
   =============================== */

function playMusic(){
const audio = document.getElementById("music");

audio.play().catch(()=>{
// nếu mobile chặn autoplay → chạm phát
document.body.addEventListener("click", ()=>{
audio.play();
},{once:true});
});
}


/* ===============================
   RUNG ĐIỆN THOẠI
   =============================== */

function vibrate(){
if(navigator.vibrate){
navigator.vibrate([300,100,300]);
}
}


/* ===============================
   CHẠY NGAY KHI LOAD
   =============================== */

window.onload = function(){

// hiện quà
document.getElementById("gift").src = getGift();

// confetti
launchConfetti();

// nhạc
playMusic();

// rung
vibrate();

};

</script>

</body>
</html>
